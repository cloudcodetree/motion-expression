<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Motion → Music</title>
    <style>
      body { margin: 0; background: #0b0b10; color: #eee; font-family: sans-serif; display: grid; place-items: center; height: 100vh; }
      #stage { position: relative; width: 640px; height: 480px; }
      #stage video, #stage canvas { position: absolute; inset: 0; width: 640px; height: 480px; transform: scaleX(-1); }
      #controls { display: flex; gap: 12px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
      button { font-size: 16px; padding: 10px 18px; border-radius: 8px; border: 0; cursor: pointer; }
      button:disabled { opacity: 0.4; cursor: default; }
      #flash { position: absolute; inset: 0; background: #00ffb4; opacity: 0; pointer-events: none; transition: opacity 70ms ease-out; transform: none; }
      #flash.on { opacity: 0.55; }
      #diag { margin: 12px auto 0; max-width: 640px; font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.5; color: #9fe; background: #14141c; border-radius: 8px; padding: 10px 14px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div>
      <div id="stage">
        <video id="video" playsinline muted></video>
        <canvas id="overlay" width="640" height="480"></canvas>
        <div id="flash"></div>
      </div>
      <div id="controls">
        <button id="rec">● REC</button>
        <button id="play" disabled>▶ PLAY</button>
        <button id="redo" disabled>↻ REDO</button>
        <button id="test">🔊 Test</button>
      </div>
      <p id="status">loading models…</p>
      <pre id="diag">diagnostics will appear here</pre>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
