<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Motion → Music</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; }
      body {
        background: #0b0b10; color: #eee;
        font-family: system-ui, sans-serif;
        min-height: 100svh;
        display: flex; justify-content: center; align-items: flex-start;
        padding: clamp(8px, 3vw, 24px);
        overflow-x: hidden;
      }
      #app { width: 100%; max-width: 640px; }
      /* Stage holds a fluid 4:3 frame; video + overlay + flash stack and fill it. */
      #stage {
        position: relative; width: 100%; aspect-ratio: 4 / 3;
        background: #000; border-radius: 10px; overflow: hidden;
      }
      #stage video, #stage canvas, #flash { position: absolute; inset: 0; width: 100%; height: 100%; }
      #stage video { object-fit: cover; transform: scaleX(-1); }
      #stage canvas { transform: scaleX(-1); }
      #flash { background: #00ffb4; opacity: 0; pointer-events: none; transition: opacity 70ms ease-out; }
      #flash.on { opacity: 0.55; }
      #controls { display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
      button {
        flex: 1 1 auto; min-width: 96px; min-height: 48px;
        font-size: 16px; padding: 12px 16px; border-radius: 10px; border: 0;
        background: #f0f0f0; color: #111; cursor: pointer;
      }
      button:disabled { opacity: 0.4; cursor: default; }
      #status { margin: 12px 2px; line-height: 1.4; }
      #diag {
        margin: 12px 0 0; width: 100%;
        font-family: ui-monospace, monospace; font-size: clamp(12px, 3.2vw, 14px);
        line-height: 1.5; color: #9fe; background: #14141c;
        border-radius: 10px; padding: 12px 14px;
        white-space: pre-wrap; overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <video id="video" playsinline muted></video>
        <canvas id="overlay" width="640" height="480"></canvas>
        <div id="flash"></div>
      </div>
      <div id="controls">
        <button id="rec">● REC</button>
        <button id="play" disabled>▶ PLAY</button>
        <button id="redo" disabled>↻ REDO</button>
        <button id="test">🔊 Test</button>
      </div>
      <p id="status">loading models…</p>
      <pre id="diag">diagnostics will appear here</pre>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
